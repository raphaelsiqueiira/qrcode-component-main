<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | QR code component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <main>
    <article class="card">
      <header>
        <picture>
          <source srcset="./images/image-qr-code.jpeg">
          <img class="card__img" src="./images/image-qr-code.webp" alt="QR Code for the Mentor Frontend page" width="576" height="576">
        </picture>
      </header>

      <section class="card__text-container">
        <h1 class="card__title">Improve your front-end skills by building projects</h1>
        <p class="card__text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
      </section>
    </article>
  </main>

  <button class="btn__accessibility" aria-label="Accessibility settings" type="button" id="btn-accessibility" aria-expanded="false">
  </button>

  <div id="modal-acessibility" class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true" aria-hidden="true">
    <article>
      <h2 id="modal-title" class="modal__title">Accessibility settings</h2>
      <section class="modal__options">
        <form>
          <div>
            <h3>Font Size</h3>
            <div>
              <label for="small-text">Small</label>
              <input type="radio" id="small-text" value="small-text" name="font-size">
              <label for="medium-text">Medium</label>
              <input type="radio" id="medium-text" value="medium-text" name="font-size">
              <label for="large-text">Large</label>
              <input type="radio" id="large-text" value="large-text" name="font-size">
            </div>
          </div>

          <div>
            <h3>Theme Color</h3>
            <div>
              <label for="auto-theme">Auto</label>
              <input type="radio" name="theme-scheme" id="auto-theme" value="auto-theme">
              <label for="dark-theme">Dark</label>
              <input type="radio" name="theme-scheme" id="dark-theme" value="dark-theme">
              <label for="light-theme">Light</label>
              <input type="radio" name="theme-scheme" id="light-theme" value="light-theme">
            </div>
          </div>
        </form>
      </section>
    </article>
  </div>

  <script type="module" src="./js/script.js"></script>
</body>

</html>
